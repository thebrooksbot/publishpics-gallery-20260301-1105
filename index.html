<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
        .gallery img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; border: 2px solid transparent; }
        .gallery img:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(0,0,0,0.2); border-color: #007bff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .close { position: absolute; top: 20px; right: 40px; color: #fff; font-size: 48px; font-weight: bold; cursor: pointer; z-index: 1001; }
        .close:hover { color: #ccc; }
        .modal-content { position: relative; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .modal-content img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
        @media (max-width: 768px) { .gallery { grid-template-columns: 1fr; gap: 12px; } .gallery img { height: 300px; } }
    </style>
</head>
<body>

    <div id="modal" class="modal" onclick="closeModal(event)">
        <span class="close" onclick="closeModal(event)">&times;</span>
        <div class="modal-content">
            <img id="modalImg">
        </div>
    </div>
    <script>
        function openModal(img) {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('modalImg').src = img.src;
        }
        function closeModal(event) {
            if (event.target.classList.contains('modal') || event.target.classList.contains('close')) {
                document.getElementById('modal').style.display = 'none';
            }
        }
    </script>
