<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        #downloadBtn { display: block; margin: 20px auto; padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        #downloadBtn:hover { background: #218838; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
        .gallery img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; border: 2px solid transparent; }
        .gallery img:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(0,0,0,0.2); border-color: #007bff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .close { position: absolute; top: 20px; right: 40px; color: #fff; font-size: 48px; font-weight: bold; cursor: pointer; z-index: 1001; }
        .close:hover { color: #ccc; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; font-size: 30px; padding: 15px 20px; cursor: pointer; border-radius: 50%; width: 60px; height: 60px; transition: background 0.3s; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .prev { left: 20px; }
        .next { right: 20px; }
        .modal-content { position: relative; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .modal-content img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
        @media (max-width: 768px) { .gallery { grid-template-columns: 1fr; gap: 12px; } .gallery img { height: 300px; } }
    </style>
</head>
<body>

    <button id="downloadBtn">⬇️ Download All Originals</button>

    </div>
    <div id="modal" class="modal" onclick="closeModal(event)">
        <span class="close" onclick="closeModal(event)">&times;</span>
        <button class="nav-btn prev" onclick="changeImg(-1)">❮</button>
        <button class="nav-btn next" onclick="changeImg(1)">❯</button>
        <div class="modal-content">
            <img id="modalImg">
        </div>
    </div>
    <script>
        const galleryImgs = Array.from(document.querySelectorAll('.gallery img'));
        let currentIndex = 0;

        function openModal(e) {
            currentIndex = galleryImgs.indexOf(e.target);
            document.getElementById('modalImg').src = galleryImgs[currentIndex].src;
            document.getElementById('modal').style.display = 'block';
        }

        function changeImg(n) {
            currentIndex = (currentIndex + n + galleryImgs.length) % galleryImgs.length;
            document.getElementById('modalImg').src = galleryImgs[currentIndex].src;
        }

        function closeModal(event) {
            if (event.target.classList.contains('modal') || event.target.classList.contains('close')) {
                document.getElementById('modal').style.display = 'none';
            }
        }

        document.addEventListener('keydown', e => {
            if (document.getElementById('modal').style.display === 'block') {
                if (e.key === 'ArrowLeft') changeImg(-1);
                if (e.key === 'ArrowRight') changeImg(1);
                if (e.key === 'Escape') closeModal({target: {classList: {contains: () => true}}});
            }
        });

        async function downloadAllIndividual() {
            for (let i = 0; i < galleryImgs.length; i++) {
                const img = galleryImgs[i];
                const a = document.createElement('a');
                a.href = img.src.replace(/image\/upload\/(v\d+\/)?/, 'image/upload/fl_attachment/'); // Original size
                a.download = img.alt || `photo_${i + 1}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                await new Promise(r => setTimeout(r, 200)); // Throttle downloads
            }
        }

        document.getElementById('downloadBtn').onclick = downloadAllIndividual;
    </script>
</body>
</html>
